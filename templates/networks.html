<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Network Control Panel - Meraki Backup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4">

    <!-- Title -->
    <h2 class="mb-4">🎛️ Network Control Panel</h2>

    <!-- Network Selection Card -->
    <div class="card shadow mb-4">
        <div class="card-header bg-primary text-white">
            🌐 Select Network
        </div>
        <div class="card-body">
            <form method="post">

                <!-- Dropdown เลือก Network -->
                <label class="form-label fw-bold">เลือก Network</label>
                <select class="form-select mb-3" name="network_id">
                    {% for net in networks %}
                    <option value="{{ net.id }}">{{ net.name }}</option>
                    {% endfor %}
                </select>

                <!-- ================= BACKUP OPTIONS ================= -->
                <div class="border rounded p-3 mb-3 bg-light">
                    <h5 class="mb-3">📦 Backup Options (Safe Mode)</h5>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="components" value="wireless" checked>
                        <label class="form-check-label">
                            📶 Wireless (SSID / AP) – แนะนำสำหรับทดสอบ Restore SSID
                        </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="components" value="switch">
                        <label class="form-check-label">
                            🔌 Switch Settings
                        </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="components" value="syslog">
                        <label class="form-check-label">
                            📝 Syslog Settings
                        </label>
                    </div>

                    <div class="form-check mt-2">
                        <input class="form-check-input" type="checkbox" id="selectAll">
                        <label class="form-check-label fw-bold text-danger">
                            ☑️ Backup All Components (ทั้งระบบ)
                        </label>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="d-flex gap-3">
                    <!-- Backup -->
                    <button formaction="/backup" class="btn btn-success btn-lg">
                        🚀 Start Backup (Selected Components)
                    </button>

                    <!-- Restore -->
                    <button formaction="/restore_page" class="btn btn-warning btn-lg">
                        ♻️ Restore Options
                    </button>
                </div>

            </form>
        </div>
    </div>

    <!-- Operation Logs -->
    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            📊 Operation Logs (Backup / Restore)
        </div>
        <div class="card-body" style="height:250px; overflow-y:auto; font-family: monospace;">
            {% if logs %}
                {% for log in logs %}
                    <div>{{ log }}</div>
                {% endfor %}
            {% else %}
                <div class="text-muted">No logs yet...</div>
            {% endif %}
        </div>
    </div>

</div>

<!-- Select All Script -->
<script>
document.getElementById("selectAll").addEventListener("change", function () {
    const checkboxes = document.querySelectorAll("input[name='components']");
    checkboxes.forEach(cb => cb.checked = this.checked);
});
</script>

</body>
</html>
